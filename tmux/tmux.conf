# tmux tuned for Ghostty quick terminal
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-dir '$HOME/.tmux/resurrect'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '0'
set -g @resurrect-save-command-strategy 'pgrep'
set -g @resurrect-processes '"~codex-aarch64-a->reset; exec codex -c features.codex_hooks=true" claude'
set -g @resurrect-strategy-nvim 'session'

set -g mouse on
set -g escape-time 10
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g status-interval 1
set -g status-position top
set -g status-justify left
set -g status-left-length 0
set -g status-right-length 80
set -g status-left ''
set -g display-time 2000
set -g status-right '#{?#{@save-flash},#[fg=colour34 bold]#{@save-flash}#[default],}#[fg=colour245]  #($HOME/Projects/dotfiles/scripts/tmux-save-status.sh) '
set -g status-style bg=default,fg=colour250
set -g message-style bg=colour39,fg=colour232,bold

setw -g window-status-separator ' '
setw -g window-status-format '#{?#{@needs_attention},#[bg=colour248 fg=colour232] 🔔 ,#[bg=colour236 fg=colour250]  }  #I #W  '
setw -g window-status-current-format '#[bg=colour39,fg=colour232,bold]#{?#{@needs_attention}, 🔔,}  #I #W  '
set -g focus-events on
set-hook -g pane-focus-in 'run-shell "$HOME/Projects/dotfiles/scripts/tmux-attention.sh focus #{window_id}"'
set-hook -gu alert-activity
set-hook -gu alert-silence
set-hook -g client-detached 'run-shell "$HOME/Projects/dotfiles/scripts/tmux-attention.sh detach"'
set-hook -g client-attached 'run-shell -b "$HOME/Projects/dotfiles/scripts/tmux-autosave-loop.sh" ; refresh-client'
set-hook -g pane-focus-out 'run-shell "$HOME/Projects/dotfiles/scripts/tmux-attention.sh blur"'
set-hook -gu session-created
set-hook -g after-select-window 'run-shell "$HOME/Projects/dotfiles/scripts/tmux-attention.sh select #{window_id}"'
set-hook -g alert-bell 'run-shell "$HOME/Projects/dotfiles/scripts/tmux-attention.sh bell #{window_id}"'
set-hook -g window-closed 'run-shell "$HOME/Projects/dotfiles/scripts/tmux-attention.sh close #{window_id}"'


setw -g monitor-activity off
setw -g window-status-bell-style bg=colour248,fg=colour232
setw -g window-status-last-style bg=colour240,fg=colour255

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind q kill-window
bind-key -n M-Left previous-window
bind-key -n M-Right next-window
bind-key -T root MouseDown2Status kill-window -t =
setw -g automatic-rename off
setw -g allow-rename off
set -g set-titles on
set -g set-titles-string '#W'

run '~/.tmux/plugins/tpm/tpm'
set -g @resurrect-restore-script-path '$HOME/Projects/dotfiles/scripts/tmux-restore.sh'
bind C-r run-shell "$HOME/Projects/dotfiles/scripts/tmux-restore.sh"
bind C-s run-shell -b "$HOME/Projects/dotfiles/scripts/tmux-manualsave.sh"
