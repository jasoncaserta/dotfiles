# tmux tuned for Ghostty quick terminal
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-strategy-nvim 'session'

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g status-justify left
set -g status-left-length 0
set -g status-right-length 24
set -g status-left ''
set -g status-right '#[fg=colour245] %H:%M '
set -g status-style bg=default,fg=colour250
set -g message-style bg=colour39,fg=colour232,bold

setw -g window-status-separator ' '
setw -g window-status-format '#{?#{==:#{@needs_attention},1},#[bg=colour248 fg=colour232] 🔔 ,#[bg=colour236 fg=colour250]  }  #I #W  '
setw -g window-status-current-format '#[bg=colour39,fg=colour232,bold]#{?#{==:#{@needs_attention},1}, 🔔,}  #I #W  '
set -g focus-events on
set-hook -gu pane-focus-in
set-hook -gu alert-activity
set-hook -gu alert-silence
set-hook -g client-detached 'run-shell "~/.tmux/plugins/tmux-resurrect/scripts/save.sh >/dev/null 2>&1"'
set-hook -g pane-focus-out 'set-option -wq @needs_attention 0; if-shell -F "#{||:#{client_attached},#{session_attached}}" "refresh-client -S"'
set-hook -g session-created 'run-shell "tmux set-option -gq @last_active_win #{window_id} 2>/dev/null"'
set-hook -g after-select-window 'run-shell "last_active=$(tmux show-options -gv @last_active_win 2>/dev/null || printf \"\"); current=#{window_id}; if [ -n \"\$last_active\" ]; then tmux set-option -wq -t \"\$last_active\" @needs_attention 0 2>/dev/null; fi; if [ -n \"\$current\" ]; then tmux set-option -gq @last_active_win \"\$current\" 2>/dev/null; tmux set-option -wq -t \"\$current\" @needs_attention 0 2>/dev/null; if tmux list-clients >/dev/null 2>&1 && [ -n \"$(tmux list-clients 2>/dev/null)\" ]; then tmux refresh-client -S 2>/dev/null; fi; fi"'
set-hook -g alert-bell 'if-shell "[ -n \"#{window_id}\" ]" "set-option -wq -t #{window_id} @needs_attention 1; if-shell -F \"#{||:#{client_attached},#{session_attached}}\" \"refresh-client -S\""'
setw -g monitor-activity off
setw -g window-status-bell-style bg=colour248,fg=colour232
setw -g window-status-last-style bg=colour240,fg=colour255

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind c new-window -c "#{pane_current_path}"
bind W kill-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind 0 select-window -t :=10
bind-key -n M-Left previous-window
bind-key -n M-Right next-window
bind-key -T root MouseDown2Status kill-window -t =
setw -g automatic-rename off
setw -g allow-rename off
set -g set-titles on
set -g set-titles-string '#W'

run '~/.tmux/plugins/tpm/tpm'
